spring.application.name=taylorSoft


spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/taylorsoft
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS (par dťfaut orientť dev)
# Mets "*" pour autoriser toutes les origines en dev (avec credentials, on utilise allowedOriginPatterns)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200,http://localhost:53803
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
app.cors.exposed-headers=Authorization,Location
app.cors.allow-credentials=true
app.cors.max-age=3600
